<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventra | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════════════
       DARKENED TEXT THEME — All text clearly visible
       Light backgrounds preserved, text made rich/dark
    ══════════════════════════════════════════════ */
    :root {
      /* Backgrounds — kept light */
      --bg:          #f5f7f2;
      --surface:     #ffffff;
      --surface2:    #eef2eb;
      --sidebar-bg:  #1e2a1e;

      /* TEXT — significantly darkened for readability */
      --text-primary:   #141a14;   /* near-black, main headings */
      --text-secondary: #2d3d2d;   /* dark green-grey, subheadings */
      --text-body:      #3a4a3a;   /* body text */
      --text-muted:     #5a6e5a;   /* labels, captions */
      --text-faint:     #7a8e7a;   /* placeholder, hints */

      /* Accents */
      --teal:        #0d7c6e;
      --teal-light:  #e0f5f2;
      --gold:        #a07830;
      --gold-light:  #fdf3e0;
      --purple:      #4a3580;
      --purple-light:#ede8ff;
      --red:         #b03030;
      --red-light:   #fdeaea;
      --green:       #1e6e3a;
      --green-light: #e4f5ec;

      /* Borders */
      --border:      rgba(30,42,30,.14);
      --border-dark: rgba(30,42,30,.22);

      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,.08);
      --shadow-sm: 0 2px 10px rgba(0,0,0,.06);

      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
    }

    /* ── ANTIGRAVITY CANVAS ── */
    #ag-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── BRAND HEADER ── */
    .brand-header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 10;
    }
    .brand-logo {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: .02em;
      margin-bottom: 5px;
    }
    .brand-logo span { color: var(--teal); }
    .brand-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* ── CARD (From provided theme) ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow-sm);
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 10;
      margin: 0 20px;
    }
    .card-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 5px;
    }
    .card-sub {
      font-size: .85rem;
      color: var(--text-muted);
    }

    /* ── FORM ELEMENTS ── */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: .95rem;
      transition: border-color .2s, background .2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--teal);
      background: var(--surface);
    }
    .form-input::placeholder { color: var(--text-faint); }

    /* ── BUTTON (Adapted from topbar-btn) ── */
    .btn-primary {
      background: var(--teal);
      color: #fff;
      border: none;
      width: 100%;
      padding: 14px 22px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background .18s, transform .18s;
      margin-top: 10px;
    }
    .btn-primary:hover { background: #0a6358; transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      color: var(--teal);
      border: 1px solid var(--border);
      width: 100%;
      padding: 14px 22px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, border-color .18s;
      margin-top: 10px;
    }
    .btn-secondary:hover { background: var(--surface2); border-color: var(--teal); }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .hidden { display: none !important; }
    .alert { padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; }
    .alert-error { background: var(--red-light); color: var(--red); border: 1px solid rgba(176,48,48,0.2); }

    /* Role Selector */
    .role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .role-btn {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; color: var(--text-muted); transition: all 0.2s;
    }
    .role-btn.active { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
    .role-icon { font-size: 1.5rem; }
    .role-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<!-- Antigravity canvas -->
<canvas id="ag-canvas"></canvas>

<div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
  
  <div class="brand-header reveal">
    <div class="brand-logo">even<span>tra</span></div>
    <div class="brand-subtitle">The Visionary Hub</div>
  </div>

  <!-- AUTHENTICATION CARD -->
  <div class="card reveal" style="transition-delay: 0.1s;">
    
    <!-- Login Section -->
    <div id="loginSection">
      <div class="card-header">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-sub">Sign in to your dashboard.</p>
      </div>
      <div id="loginAlert" class="alert alert-error hidden"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="name@domain.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a id="showRegister">Create one</a>
      </div>
    </div>

    <!-- Register Section -->
    <div id="registerSection" class="hidden">
      <div class="card-header">
        <h2 class="card-title">Create Account</h2>
        <p class="card-sub">Join the Eventra network.</p>
      </div>
      <div id="registerAlert" class="alert alert-error hidden"></div>
      
      <div class="form-group">
        <label class="form-label">Select Role</label>
        <input type="hidden" id="registerRole" value="user">
        <div class="role-grid">
          <div class="role-btn active" data-role="user">
            <span class="material-symbols-outlined role-icon">person</span>
            <span class="role-label">USER</span>
          </div>
          <div class="role-btn" data-role="host">
            <span class="material-symbols-outlined role-icon">stadium</span>
            <span class="role-label">HOST</span>
          </div>
          <div class="role-btn" data-role="admin">
            <span class="material-symbols-outlined role-icon">admin_panel_settings</span>
            <span class="role-label">ADMIN</span>
          </div>
        </div>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="registerName">Full Name</label>
          <input class="form-input" id="registerName" type="text" placeholder="Jane Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="registerEmail">Email</label>
          <input class="form-input" id="registerEmail" type="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="registerPassword">Password</label>
          <input class="form-input" id="registerPassword" type="password" placeholder="••••••••" required minlength="6"/>
        </div>
        <button type="submit" class="btn-primary">Register</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a id="showLogin">Sign In</a>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════
   ANTIGRAVITY PARTICLES (lighter, subtle)
═══════════════════════════════════════ */
const canvas = document.getElementById('ag-canvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const PALETTE = [
  'rgba(13,124,110,',
  'rgba(111,207,191,',
  'rgba(160,120,48,',
  'rgba(74,53,128,',
  'rgba(30,110,58,',
];

class Dot {
  constructor(initial) {
    this.x  = Math.random() * canvas.width;
    this.y  = initial ? Math.random() * canvas.height : canvas.height + 10;
    this.r  = 1.2 + Math.random() * 3;
    this.vx = (Math.random() - .5) * .35;
    this.vy = -(0.2 + Math.random() * 0.45);
    this.alpha = 0.07 + Math.random() * 0.16;
    this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.wb = Math.random() * Math.PI * 2;
    this.wbS = 0.008 + Math.random() * 0.018;
  }
  update(mx, my) {
    this.vy -= 0.0008;
    this.wb += this.wbS;
    this.x += this.vx + Math.sin(this.wb) * 0.28;
    this.y += this.vy;

    const dx = this.x - mx, dy = this.y - my;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 80) {
      const f = (80 - d) / 80;
      this.vx += (dx/d) * f * 1.4;
      this.vy += (dy/d) * f * 1.4;
    }
    this.vx *= 0.988;
    this.vy = Math.max(this.vy * 0.99, -0.7);

    if (this.y < -12 || this.x < -30 || this.x > canvas.width + 30) {
      Object.assign(this, new Dot(false));
    }
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 2.5);
    g.addColorStop(0,   this.color + this.alpha + ')');
    g.addColorStop(0.6, this.color + (this.alpha * .4) + ')');
    g.addColorStop(1,   this.color + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 2.5, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * .45, 0, Math.PI*2);
    ctx.fillStyle = this.color + Math.min(this.alpha * 2, .4) + ')';
    ctx.fill();
  }
}

const dots = Array.from({ length: 70 }, (_, i) => new Dot(true));
let mx = canvas.width/2, my = canvas.height/2;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  dots.forEach(d => { d.update(mx, my); d.draw(); });
  requestAnimationFrame(loop);
})();

/* ═══════════════════════════════════════
   SCROLL REVEAL & UI LOGIC
═══════════════════════════════════════ */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach((el, i) => {
  el.style.transitionDelay = i * 0.1 + 's';
  io.observe(el);
});

// Form Toggling
const loginSection = document.getElementById('loginSection');
const registerSection = document.getElementById('registerSection');
document.getElementById('showRegister').addEventListener('click', () => {
  loginSection.classList.add('hidden');
  registerSection.classList.remove('hidden');
});
document.getElementById('showLogin').addEventListener('click', () => {
  registerSection.classList.add('hidden');
  loginSection.classList.remove('hidden');
});

// Role Selection
const roleBtns = document.querySelectorAll('.role-btn');
const roleInput = document.getElementById('registerRole');
roleBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    roleBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    roleInput.value = btn.getAttribute('data-role');
  });
});

// Ensure visible on load
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
});
</script>

<script src="js/auth.js?v=3"></script>
</body>
</html>
